version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-change-in-production}
    volumes:
      - ./crypto_analysis.db:/app/crypto_analysis.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "8502:8501"
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://web:8000
    depends_on:
      web:
        condition: service_healthy
